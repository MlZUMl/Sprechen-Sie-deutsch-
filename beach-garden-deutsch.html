<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Garden — Deutsch Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sea: #1a6b8a;
    --sea-dark: #0e4a63;
    --sea-light: #2d9fc5;
    --turquoise: #00b4c4;
    --sand: #f5e6c8;
    --sand-light: #fdf6e8;
    --sand-dark: #d4b896;
    --white: #ffffff;
    --text: #1a2e38;
    --text-light: #5a7a88;
    --green: #3aaa6b;
    --coral: #e8604a;
    --gold: #d4a017;
    --shadow: 0 4px 20px rgba(26,107,138,0.15);
    --shadow-lg: 0 8px 40px rgba(26,107,138,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand-light);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(135deg, var(--sea-dark) 0%, var(--sea) 50%, var(--sea-light) 100%);
    padding: 16px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .logo-wrap img {
    height: 48px;
    filter: brightness(0) invert(1);
    display: block;
  }
  .logo-wrap img.logo-error { display: none; }
  .header-title {
    flex: 1;
  }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    line-height: 1.2;
  }
  .header-title p {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .stars { color: var(--gold); font-size: 0.75rem; letter-spacing: 1px; }

  /* Barre de recherche */
  .search-bar {
    position: relative;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    border-radius: 25px;
    border: none;
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 0.88rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    backdrop-filter: blur(4px);
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.65); }
  .search-bar .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 1rem; pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,0.7);
    font-size: 1.1rem; cursor: pointer; padding: 0; display: none;
  }
  .search-clear.visible { display: block; }

  /* ─── BOUTON SURVIE ─── */
  .survival-btn {
    width: calc(100% - 32px);
    margin: 14px 16px 0;
    background: linear-gradient(135deg, var(--coral), #c0392b);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(232,96,74,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }
  .survival-btn:active { transform: scale(0.98); }
  .survival-btn .pulse {
    width: 10px; height: 10px;
    background: white; border-radius: 50%;
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ─── TABS ─── */
  .tabs-scroll {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--white);
    border-bottom: 2px solid var(--sand);
    scrollbar-width: none;
  }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 12px;
    min-width: max-content;
  }
  .tab-btn {
    padding: 12px 16px;
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn.active {
    color: var(--sea);
    border-bottom-color: var(--sea);
    font-weight: 600;
  }
  .tab-btn .tab-emoji { font-size: 1rem; }

  /* ─── STATS BAR ─── */
  .stats-bar {
    background: var(--white);
    padding: 10px 16px;
    display: flex; gap: 16px;
    border-bottom: 1px solid var(--sand);
    font-size: 0.78rem;
    color: var(--text-light);
  }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-item span:first-child { font-size: 0.9rem; }
  .stat-count { font-weight: 700; color: var(--sea); }

  /* ─── CONTENU PRINCIPAL ─── */
  .main { padding: 14px 14px 80px; }

  /* ─── SECTION ─── */
  .section-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 18px 0 10px 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--sand-dark);
  }

  /* ─── PHRASE CARD ─── */
  .phrase-card {
    background: var(--white);
    border-radius: 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    border-left: 4px solid var(--sea);
  }
  .phrase-card:active { transform: scale(0.99); }
  .phrase-card.favori { border-left-color: var(--gold); }

  .card-body {
    padding: 14px 14px 10px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .card-emoji {
    font-size: 1.4rem; flex-shrink: 0; margin-top: 2px;
  }
  .card-texts { flex: 1; min-width: 0; }
  .card-fr {
    font-size: 0.82rem;
    color: var(--text-light);
    margin-bottom: 4px;
    font-weight: 400;
  }
  .card-de {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 5px;
  }
  .card-phonetic {
    font-size: 0.78rem;
    color: var(--turquoise);
    font-style: italic;
    font-weight: 400;
  }
  .card-phonetic::before { content: '🔤 '; font-style: normal; }

  .card-actions {
    display: flex; gap: 8px; padding: 0 14px 12px;
    justify-content: flex-end; align-items: center;
  }
  .btn-audio {
    background: linear-gradient(135deg, var(--sea), var(--sea-light));
    color: white;
    border: none; border-radius: 25px;
    padding: 7px 16px; font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(26,107,138,0.3);
  }
  .btn-audio:active { transform: scale(0.95); }
  .btn-audio.playing { background: linear-gradient(135deg, var(--turquoise), var(--green)); }
  .btn-fav {
    background: none; border: 1.5px solid var(--sand-dark);
    border-radius: 25px; padding: 6px 12px;
    font-size: 0.8rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .btn-fav.active { background: var(--gold); border-color: var(--gold); color: white; }

  /* ─── MODE SURVIE OVERLAY ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,30,40,0.92);
    backdrop-filter: blur(6px);
    overflow-y: auto;
    padding: 20px 16px 40px;
  }
  .overlay.visible { display: block; }
  .overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .overlay-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: white;
    display: flex; align-items: center; gap: 10px;
  }
  .overlay-close {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 50%; width: 38px; height: 38px;
    color: white; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .survival-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px; padding: 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--coral);
  }
  .survival-card .card-fr { color: rgba(255,255,255,0.6); }
  .survival-card .card-de { color: white; }
  .survival-card .card-phonetic { color: var(--turquoise); }
  .survival-card .card-actions { padding: 8px 0 0; }
  .survival-card .btn-audio { background: linear-gradient(135deg, var(--coral), #c0392b); }

  /* ─── MODE QUIZ ─── */
  .quiz-section { display: none; }
  .quiz-section.active { display: block; }
  .quiz-card {
    background: var(--white);
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: var(--shadow-lg);
    margin-bottom: 14px;
  }
  .quiz-question-label {
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-light);
    margin-bottom: 12px;
  }
  .quiz-question {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; color: var(--text);
    margin-bottom: 20px; line-height: 1.4;
  }
  .quiz-options { display: grid; gap: 10px; }
  .quiz-option {
    padding: 14px 18px;
    border-radius: 12px;
    border: 2px solid var(--sand-dark);
    background: var(--sand-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer; text-align: left;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .quiz-option:hover { border-color: var(--sea); background: rgba(26,107,138,0.05); }
  .quiz-option.correct { border-color: var(--green); background: rgba(58,170,107,0.1); color: var(--green); font-weight: 600; }
  .quiz-option.wrong { border-color: var(--coral); background: rgba(232,96,74,0.1); color: var(--coral); }
  .quiz-feedback {
    margin-top: 14px; padding: 12px 16px;
    border-radius: 12px; font-size: 0.9rem; font-weight: 500;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: rgba(58,170,107,0.1); color: var(--green); }
  .quiz-feedback.wrong { background: rgba(232,96,74,0.1); color: var(--coral); }
  .quiz-next {
    width: 100%; margin-top: 12px;
    background: linear-gradient(135deg, var(--sea), var(--sea-light));
    color: white; border: none; border-radius: 14px;
    padding: 14px; font-size: 0.95rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: none; box-shadow: var(--shadow);
    transition: opacity 0.2s;
  }
  .quiz-next.show { display: block; }
  .quiz-score {
    background: linear-gradient(135deg, var(--sea-dark), var(--sea));
    color: white; border-radius: 20px;
    padding: 28px 24px; text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .quiz-score h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; }
  .quiz-score p { color: rgba(255,255,255,0.8); margin-bottom: 16px; }
  .quiz-restart {
    background: var(--gold); color: white; border: none;
    border-radius: 12px; padding: 12px 28px;
    font-size: 0.95rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .quiz-progress {
    background: var(--sand); border-radius: 10px;
    height: 6px; margin-bottom: 14px; overflow: hidden;
  }
  .quiz-progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--sea), var(--turquoise));
    border-radius: 10px; transition: width 0.4s ease;
  }

  /* ─── FAVORIS VIDE ─── */
  .empty-favs {
    text-align: center; padding: 50px 20px;
    color: var(--text-light);
  }
  .empty-favs .big-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
  .empty-favs p { font-size: 0.9rem; line-height: 1.5; }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--sand);
    display: flex;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 50;
  }
  .nav-btn {
    flex: 1; border: none; background: none;
    padding: 10px 6px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem; font-weight: 500;
    color: var(--text-light);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: color 0.2s;
  }
  .nav-btn .nav-icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--sea); }

  /* ─── SEARCH RESULTS ─── */
  .search-results-info {
    font-size: 0.8rem; color: var(--text-light);
    padding: 10px 4px 0; margin-bottom: 6px;
  }
  .no-results {
    text-align: center; padding: 40px 20px;
    color: var(--text-light);
  }
  .no-results .big-emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  /* Highlight recherche */
  mark { background: rgba(0,180,196,0.2); color: var(--sea-dark); border-radius: 3px; padding: 0 2px; }

  /* Transitions views */
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <img src="https://static.secureholiday.net/static/CMS/photos/000/062/000062239.png?w=1000&format=webp"
           alt="Les Méditerranées"
           onerror="this.classList.add('logo-error'); this.nextElementSibling.style.display='block'">
      <span style="display:none; font-family:'Playfair Display',serif; color:white; font-size:0.85rem; font-style:italic;">Les Méditerranées</span>
    </div>
    <div class="header-title">
      <div class="stars">★★★★★</div>
      <h1>Beach Garden</h1>
      <p>Guide Deutsch · Réceptionniste</p>
    </div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher une phrase..." oninput="handleSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- BOUTON SURVIE -->
<button class="survival-btn" onclick="openSurvival()">
  <div class="pulse"></div>
  🚨 MODE SURVIE — 10 phrases d'urgence
</button>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item">⭐ <span>Favoris : </span><span class="stat-count" id="statFavs">0</span></div>
  <div class="stat-item">🎯 <span>Quiz : </span><span class="stat-count" id="statScore">-</span></div>
  <div class="stat-item">💬 <span>Phrases : </span><span class="stat-count">120</span></div>
</div>

<!-- TABS -->
<div class="tabs-scroll">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('phrasebook', this)"><span class="tab-emoji">💬</span> Phrasebook</button>
    <button class="tab-btn" onclick="switchTab('quiz', this)"><span class="tab-emoji">🎯</span> Quiz</button>
    <button class="tab-btn" onclick="switchTab('favs', this)"><span class="tab-emoji">⭐</span> Favoris</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- ─── VIEW: PHRASEBOOK ─── -->
  <div class="view active" id="view-phrasebook">
    <div id="searchResultsInfo" class="search-results-info" style="display:none;"></div>
    <div id="phraseList"></div>
  </div>

  <!-- ─── VIEW: QUIZ ─── -->
  <div class="view" id="view-quiz">
    <div id="quizContent"></div>
  </div>

  <!-- ─── VIEW: FAVORIS ─── -->
  <div class="view" id="view-favs">
    <div id="favsList"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('phrasebook', null, this)">
    <span class="nav-icon">💬</span> Phrasebook
  </button>
  <button class="nav-btn" onclick="switchTab('quiz', null, this)">
    <span class="nav-icon">🎯</span> Quiz
  </button>
  <button class="nav-btn" onclick="switchTab('favs', null, this)">
    <span class="nav-icon">⭐</span> Favoris
  </button>
</div>

<!-- OVERLAY SURVIE -->
<div class="overlay" id="survivalOverlay">
  <div class="overlay-header">
    <div class="overlay-title">🚨 Mode Survie</div>
    <button class="overlay-close" onclick="closeSurvival()">✕</button>
  </div>
  <div id="survivalCards"></div>
</div>

let favorites = new Set();

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'de-DE';
  utt.rate = 0.85;
  if (btn) {
    btn.classList.add('playing');
    btn.textContent = '⏹ Stop';
    utt.onend = () => { btn.classList.remove('playing'); btn.innerHTML = '🔊 Écouter'; };
    utt.onerror = () => { btn.classList.remove('playing'); btn.innerHTML = '🔊 Écouter'; };
    // Si déjà playing, on stop
    if (btn.classList.contains('playing-active')) {
      window.speechSynthesis.cancel();
      btn.classList.remove('playing-active');
      return;
    }
  }
  window.speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════
// FAVORIS
// ═══════════════════════════════════════════
function toggleFav(idx) {
  if (favorites.has(idx)) favorites.delete(idx);
  else favorites.add(idx);
  document.getElementById('statFavs').textContent = favorites.size;
  // Update button
  const btn = document.querySelector(`[data-fav="${idx}"]`);
  if (btn) { btn.classList.toggle('active', favorites.has(idx)); btn.textContent = favorites.has(idx) ? '⭐ Favori' : '☆ Ajouter'; }
  if (currentTab === 'favs') renderFavs();
}

// ═══════════════════════════════════════════
// RENDER PHRASE CARD
// ═══════════════════════════════════════════
function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderCard(p, idx, query='', isSurvival=false) {
  const isFav = favorites.has(idx);
  const prefix = isSurvival ? 'surv' : 'ph';
  return `
    <div class="phrase-card${isFav?' favori':''}" id="card-${prefix}-${idx}">
      <div class="card-body">
        <span class="card-emoji">${p.emoji}</span>
        <div class="card-texts">
          <div class="card-fr">${highlight(p.fr, query)}</div>
          <div class="card-de">${highlight(p.de, query)}</div>
          <div class="card-phonetic">${p.phonetic}</div>
        </div>
      </div>
      <div class="card-actions">
        ${!isSurvival ? `<button class="btn-fav${isFav?' active':''}" data-fav="${idx}" onclick="toggleFav(${idx})">${isFav?'⭐ Favori':'☆ Ajouter'}</button>` : ''}
        <button class="btn-audio" onclick="speak(PHRASES[${idx}]?.de || SURVIVAL[${idx}]?.de, this)">🔊 Écouter</button>
      </div>
    </div>`;
}

function renderSurvivalCard(p, idx) {
  return `
    <div class="survival-card">
      <div class="card-body">
        <span class="card-emoji">${p.emoji}</span>
        <div class="card-texts">
          <div class="card-fr">${p.fr}</div>
          <div class="card-de">${p.de}</div>
          <div class="card-phonetic">${p.phonetic}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-audio" onclick="speak(SURVIVAL[${idx}].de, this)">🔊 Écouter</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// RENDER PHRASEBOOK
// ═══════════════════════════════════════════
function renderPhrasebook(query='') {
  const list = document.getElementById('phraseList');
  const info = document.getElementById('searchResultsInfo');
  const q = query.toLowerCase().trim();

  const filtered = PHRASES.map((p,i) => ({p,i})).filter(({p}) =>
    !q || p.fr.toLowerCase().includes(q) || p.de.toLowerCase().includes(q)
  );

  if (q) {
    info.style.display = 'block';
    info.textContent = `${filtered.length} résultat${filtered.length>1?'s':''} pour "${query}"`;
  } else {
    info.style.display = 'none';
  }

  if (!filtered.length) {
    list.innerHTML = `<div class="no-results"><span class="big-emoji">🔍</span><p>Aucune phrase trouvée pour <strong>"${query}"</strong></p></div>`;
    return;
  }

  if (q) {
    list.innerHTML = filtered.map(({p,i}) => renderCard(p,i,query)).join('');
    return;
  }

  // Grouper par catégorie
  const cats = {};
  PHRASES.forEach((p,i) => { if(!cats[p.cat]) cats[p.cat]=[]; cats[p.cat].push({p,i}); });
  list.innerHTML = Object.entries(cats).map(([cat, items]) => `
    <div class="section-label">${items[0].p.emoji} ${cat}</div>
    ${items.map(({p,i}) => renderCard(p,i)).join('')}
  `).join('');
}

// ═══════════════════════════════════════════
// RENDER FAVORIS
// ═══════════════════════════════════════════
function renderFavs() {
  const el = document.getElementById('favsList');
  if (!favorites.size) {
    el.innerHTML = `<div class="empty-favs"><span class="big-emoji">☆</span><p>Aucun favori pour l'instant.<br>Touchez <strong>☆ Ajouter</strong> sur une phrase pour la retrouver ici.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="section-label">⭐ Mes phrases favorites</div>` +
    [...favorites].map(i => renderCard(PHRASES[i], i)).join('');
}

// ═══════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════
function startQuiz() {
  quizList = [...PHRASES].sort(() => Math.random()-0.5).slice(0, 10);
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  const el = document.getElementById('quizContent');
  if (quizIndex >= quizList.length) {
    document.getElementById('statScore').textContent = `${quizScore}/10`;
    el.innerHTML = `<div class="quiz-score">
      <h2>${quizScore >= 8 ? '🏆' : quizScore >= 5 ? '👏' : '💪'} ${quizScore}/10</h2>
      <p>${quizScore>=8?'Excellent ! Vous maîtrisez l\'allemand du camping !':quizScore>=5?'Bon travail ! Continuez à pratiquer.':'Encore un peu de pratique !'}</p>
      <button class="quiz-restart" onclick="startQuiz()">🔄 Rejouer</button>
    </div>`;
    return;
  }

  const q = quizList[quizIndex];
  const wrongs = PHRASES.filter(p=>p.de!==q.de).sort(()=>Math.random()-0.5).slice(0,3);
  const options = [...wrongs, q].sort(()=>Math.random()-0.5);

  el.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${(quizIndex/10)*100}%"></div></div>
      <div class="quiz-question-label">Question ${quizIndex+1}/10</div>
      <div class="quiz-question">${q.emoji} « ${q.fr} »</div>
      <div class="quiz-options">
        ${options.map((opt,i) => `<button class="quiz-option" onclick="answerQuiz(this,'${opt.de.replace(/'/g,"\\'")}','${q.de.replace(/'/g,"\\'")}')">${opt.de}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="quiz-next" id="quizNext" onclick="nextQuiz()">Suivant →</button>
    </div>`;
}

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const feedback = document.getElementById('quizFeedback');
  document.querySelectorAll('.quiz-option').forEach(b => b.style.pointerEvents='none');

  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    feedback.className = 'quiz-feedback correct show';
    feedback.textContent = '✅ Correct !';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if(b.textContent===correct) b.classList.add('correct'); });
    feedback.className = 'quiz-feedback wrong show';
    feedback.textContent = `❌ Réponse : ${correct}`;
  }
  document.getElementById('quizNext').classList.add('show');
}

function nextQuiz() {
  quizIndex++; quizAnswered = false;
  renderQuiz();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function switchTab(tab, tabBtn, navBtn) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');

  if (tabBtn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    tabBtn.classList.add('active');
  }
  if (navBtn) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    navBtn.classList.add('active');
  }
  // Sync both
  const tabBtns = document.querySelectorAll('.tab-btn');
  const navBtns = document.querySelectorAll('.nav-btn');
  const idx = ['phrasebook','quiz','favs'].indexOf(tab);
  if (idx>=0) { tabBtns[idx]?.classList.add('active'); navBtns[idx]?.classList.add('active'); }

  if (tab==='quiz' && quizList.length===0) startQuiz();
  if (tab==='favs') renderFavs();
  if (tab==='phrasebook') renderPhrasebook(document.getElementById('searchInput').value);
}

// ═══════════════════════════════════════════
// RECHERCHE
// ═══════════════════════════════════════════
function handleSearch(val) {
  document.getElementById('searchClear').classList.toggle('visible', val.length>0);
  if (currentTab !== 'phrasebook') switchTab('phrasebook', null, null);
  renderPhrasebook(val);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderPhrasebook('');
}

// ═══════════════════════════════════════════
// SURVIE
// ═══════════════════════════════════════════
function openSurvival() {
  const el = document.getElementById('survivalCards');
  el.innerHTML = SURVIVAL.map((p,i) => renderSurvivalCard(p,i)).join('');
  document.getElementById('survivalOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSurvival() {
  document.getElementById('survivalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

// Fix speak in survival cards
function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'de-DE'; utt.rate = 0.85;
  const origHTML = btn.innerHTML;
  btn.innerHTML = '⏹ Stop';
  btn.classList.add('playing');
  utt.onend = () => { btn.innerHTML = '🔊 Écouter'; btn.classList.remove('playing'); };
  utt.onerror = () => { btn.innerHTML = '🔊 Écouter'; btn.classList.remove('playing'); };
  window.speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderPhrasebook();
</script>
